name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: google_jobs_crawler_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3333
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/google_jobs_crawler_test?schema=public
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_SECRET: ci-google-secret
      SMTP_USER: ci-smtp-user
      SMTP_PASSWORD: ci-smtp-password
      FRONTEND_URL: http://localhost:3000
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

      - name: Apply database migrations
        run: yarn migrate:deploy

      - name: Run unit tests
        run: yarn test

      - name: Run e2e tests
        run: yarn test:e2e
